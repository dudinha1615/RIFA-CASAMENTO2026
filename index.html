<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rifa Beneficente - Daniel & Emanuelli</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f7f3ec;
      color:#333;
      padding:20px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .topo{
      text-align:center;
      margin-bottom:30px;
    }

    .topo h1{
      font-size:48px;
      color:#4d2c13;
    }

    .topo h2{
      color:#c9972b;
      font-size:38px;
      margin-top:5px;
    }

    .info{
      text-align:center;
      margin-top:15px;
      font-size:20px;
    }

    .valor{
      margin-top:20px;
      background:#4d2c13;
      color:white;
      display:inline-block;
      padding:15px 40px;
      border-radius:12px;
      font-size:28px;
      font-weight:bold;
      line-height:1.5;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(70px,1fr));
      gap:10px;
      margin-top:40px;
    }

    .numero{
      background:white;
      border:2px solid #c9972b;
      border-radius:10px;
      padding:15px 5px;
      text-align:center;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
      user-select:none;
    }

    .numero:hover{
      transform:scale(1.05);
    }

    .selecionado{
      background:#2ecc71;
      color:white;
      border-color:#27ae60;
    }

    .comprado{
      background:#ff3b30;
      color:white;
      border-color:#d62828;
      cursor:not-allowed;
    }

    .legenda{
      display:flex;
      gap:20px;
      justify-content:center;
      margin-top:30px;
      flex-wrap:wrap;
    }

    .item-legenda{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:bold;
    }

    .cor{
      width:20px;
      height:20px;
      border-radius:5px;
    }

    .selecionados{
      margin-top:20px;
      font-size:20px;
      text-align:center;
    }

    .acoes{
      text-align:center;
      margin-top:40px;
    }

    button{
      background:#25d366;
      color:white;
      border:none;
      padding:16px 35px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.03);
      background:#1ebe5d;
    }

    .pix{
      margin-top:30px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
      color:#4d2c13;
    }

    @media(max-width:600px){

      body{
        padding:10px;
      }

      .topo h1{
        font-size:32px;
      }

      .topo h2{
        font-size:26px;
      }

      .valor{
        font-size:22px;
        padding:12px 20px;
      }

      .grid{
        grid-template-columns: repeat(auto-fill, minmax(55px,1fr));
        gap:8px;
      }

      .numero{
        padding:12px 4px;
        font-size:14px;
      }

      button{
        width:100%;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="topo">

    <h1>RIFA BENEFICENTE</h1>
    <h2>Daniel & Emanuelli</h2>
   <img src="imagem/ada4b42f-87af-4b2c-aa28-50c13deb1ec5.jpg" alt="PREMIO">

  

    <div class="info">
      Cada número custa apenas <strong>R$ 15,00</strong>
    </div>

    <div class="valor">
      450 NÚMEROS • 
      <span id="qtdComprados"></span> COMPRADOS
      <br>
      RESTAM <span id="qtdRestantes"></span>
    </div>

  </div>

  <div class="legenda">

    <div class="item-legenda">
      <div class="cor" style="background:#fff;border:2px solid #c9972b;"></div>
      Disponível
    </div>

    <div class="item-legenda">
      <div class="cor" style="background:#2ecc71;"></div>
      Selecionado
    </div>

    <div class="item-legenda">
      <div class="cor" style="background:#ff3b30;"></div>
      Comprado
    </div>

  </div>

  <div class="grid" id="grid"></div>

  <div class="selecionados">
    <strong>Números escolhidos:</strong>
    <span id="listaSelecionados">Nenhum</span>
  </div>

  <div class="acoes">

    <button onclick="enviarWhatsApp()">
      Reservar pelo WhatsApp
    </button>

  </div>

  <div class="pix">
    PIX: 43984299837
  </div>

</div>
<script>

const numerosComprados = [
  "002",
  "005",
  "009",
  "012",
  "015",
  "023",
  "025",
  "026",
  "030",
  "049",
  "051",
  "055",
  "065",
  "067",
  "088",
  "146",
  "179",
  "233",
  "258",
  "425",
  "311",
  "327",
  "333",
  "450",
  "204",
  "083",
  "141",
  "444",
  "449",
];

const compradores = {
  "002": "Maria",
   "005":" João Gabriel Lourenço",
   "009":"Rosangela Lima",
   "012": "Vanderlei",
 "015": "Alessandro Amigo do Daniel",
  "025": " Daia",
  "026": "Amarildo Donizeti Batista",
  "030": "Vanderlei",
  "049": "Shirley",
  "051":"João Maria de Oliveira",
  "055": " Daia",
  "065": "Shirley",
  "067": "Aislan Flavio Furtuoso",
  "146": "Shirley",
  "179":"Maria",
  "233": "Sebastiao",
  "258":"Malu",
  "425":"Maria",
   "311":"Diego Antonio",
  "327": "Maria",
  "333": "Marcia",
  "450": "Leandro",
   "204": "Ideidy",
   "083":"Haroldo Ferrari",
   "088": "José Sidnei Dos Santos",
    "141":"Haroldo Ferrari",
    "023":"Elias",
    "444": "Wilma Francisca de Oliveira Furtuoso",
     "449": "Jonatan Soares Ajala",

};

let selecionados = [];

const grid = document.getElementById("grid");

// MOSTRAR QUANTIDADE DE COMPRADOS
document.getElementById("qtdComprados").innerText =
  numerosComprados.length;

// MOSTRAR QUANTIDADE RESTANTE
document.getElementById("qtdRestantes").innerText =
  450 - numerosComprados.length;

for(let i = 1; i <= 450; i++){

  const numero = i.toString().padStart(3, "0");

  const div = document.createElement("div");

  div.classList.add("numero");

  // MOSTRAR NOME NO NÚMERO COMPRADO
  if(numerosComprados.includes(numero)){

    div.classList.add("comprado");

    div.innerHTML = `
      <div style="font-size:20px;">${numero}</div>
      <div style="font-size:11px;margin-top:8px;">
        ${compradores[numero] || ""}
      </div>
    `;

  } else {

    div.innerText = numero;

    div.addEventListener("click", () => {

      div.classList.toggle("selecionado");

      if(selecionados.includes(numero)){

        selecionados = selecionados.filter(n => n !== numero);

      } else {

        selecionados.push(numero);

      }

      atualizarLista();

    });

  }

  grid.appendChild(div);

}

function atualizarLista(){

  const lista = document.getElementById("listaSelecionados");

  if(selecionados.length === 0){

    lista.innerText = "Nenhum";

  } else {

    lista.innerText = selecionados.join(", ");

  }

}

function enviarWhatsApp(){

  if(selecionados.length === 0){

    alert("Escolha pelo menos um número.");

    return;

  }

  const mensagem =
    `Olá! Quero reservar os números: ${selecionados.join(", ")}`;

  const telefone = "5543984420862";

  const url =
    `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");

}

</script>

</body>
</html>
